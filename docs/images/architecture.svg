<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Inter, system-ui, sans-serif" font-size="13">
  <style>
    .layer { fill: #f8fafc; stroke: #cbd5e1; rx: 8; }
    .agent { fill: #fef9c3; stroke: #ca8a04; rx: 10; }
    .main { fill: #dbeafe; stroke: #2563eb; rx: 10; }
    .infra { fill: #ecfccb; stroke: #65a30d; rx: 10; }
    .arrow { stroke: #475569; stroke-width: 1.4; fill: none; marker-end: url(#a); }
    text { fill: #0f172a; }
    .title { font-weight: 700; font-size: 14px; }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="layer" x="20" y="20" width="840" height="60"/>
  <text class="title" x="40" y="55">FastAPI Gateway · /chat · /screening · /plan · /insight</text>

  <rect class="main" x="240" y="110" width="400" height="100"/>
  <text class="title" x="260" y="135">AI 营养师 Agent (LangGraph 主控)</text>
  <text x="260" y="160">意图识别 → 子 Agent 路由 → 工具调用</text>
  <text x="260" y="180">→ 引用核验 → 安全兜底 · ReAct 循环</text>
  <text x="260" y="200">多轮记忆 / 用户画像 (实体抽取)</text>

  <rect class="agent" x="40"  y="250" width="180" height="90"/>
  <text class="title" x="55" y="275">营养风险筛查 Agent</text>
  <text x="55" y="295">NRS2002 评分</text>
  <text x="55" y="312">PDF 报告 / 评测看板</text>

  <rect class="agent" x="240" y="250" width="200" height="90"/>
  <text class="title" x="255" y="275">个性化营养方案 Agent</text>
  <text x="255" y="295">BM25+BGE+RRF 混合检索</text>
  <text x="255" y="312">Cross-Encoder 精排 + 7 天方案</text>

  <rect class="agent" x="460" y="250" width="180" height="90"/>
  <text class="title" x="475" y="275">健康数据洞察 Agent</text>
  <text x="475" y="295">Vanna.ai NL2SQL</text>
  <text x="475" y="312">Dify 编排 / ECharts</text>

  <rect class="agent" x="660" y="250" width="180" height="90"/>
  <text class="title" x="675" y="275">Function Calling 工具</text>
  <text x="675" y="295">BMI / 能量 / 食谱</text>
  <text x="675" y="312">营养查询 / 慢病禁忌</text>

  <rect class="infra" x="20" y="380" width="840" height="100"/>
  <text class="title" x="40" y="410">数据 / 模型层</text>
  <text x="40" y="435">Milvus (向量) · MySQL (业务 / 画像) · Redis (会话 / 缓存) · MinIO (PDF / 报告)</text>
  <text x="40" y="455">vLLM (大模型私有化) · BGE Embedding · BGE Reranker (Cross-Encoder)</text>

  <line class="arrow" x1="440" y1="80" x2="440" y2="105"/>
  <line class="arrow" x1="340" y1="215" x2="160" y2="245"/>
  <line class="arrow" x1="420" y1="215" x2="340" y2="245"/>
  <line class="arrow" x1="500" y1="215" x2="540" y2="245"/>
  <line class="arrow" x1="580" y1="215" x2="730" y2="245"/>
  <line class="arrow" x1="130" y1="345" x2="200" y2="375"/>
  <line class="arrow" x1="340" y1="345" x2="380" y2="375"/>
  <line class="arrow" x1="540" y1="345" x2="560" y2="375"/>
  <line class="arrow" x1="730" y1="345" x2="720" y2="375"/>
</svg>
