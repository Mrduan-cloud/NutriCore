name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          pip install pydantic pydantic-settings jsonschema rank_bm25

      - name: Ruff lint
        run: ruff check app tests scripts

      - name: AST parse all .py
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          fails = []
          for p in pathlib.Path('.').rglob('*.py'):
              try:
                  ast.parse(p.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  fails.append(f"{p}: {e}")
          if fails:
              print('\n'.join(fails))
              sys.exit(1)
          print("AST OK")
          PY

      - name: Pure-logic tests
        run: pytest tests/test_nrs2002.py tests/test_meal_plan_validator.py tests/test_nl2sql_safety.py -v
