name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          # ruff 固定版本:CI 装无 pin 的 ruff 会随新版规则收紧而突然变红(本仓即因此红过)
          pip install ruff==0.15.15 pytest pytest-asyncio
          # 运行时依赖(与 requirements.txt 的 pin 对齐),供图 / 记忆 / 纯逻辑测试导入
          pip install \
            pydantic==2.6.4 pydantic-settings==2.2.1 jsonschema==4.21.1 rank-bm25==0.2.2 \
            langgraph==0.0.40 langchain-core==0.1.46 openai==1.23.2 redis==5.0.3 \
            loguru==0.7.2 prometheus-client==0.20.0 tortoise-orm==0.20.0 \
            pymilvus==2.4.0 sqlalchemy==2.0.29 httpx==0.27.0 fastapi==0.110.0 \
            "marshmallow<4" environs==9.5.0

      - name: Ruff lint
        run: ruff check app tests scripts

      - name: AST parse all .py
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          fails = []
          for p in pathlib.Path('.').rglob('*.py'):
              try:
                  ast.parse(p.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  fails.append(f"{p}: {e}")
          if fails:
              print('\n'.join(fails))
              sys.exit(1)
          print("AST OK")
          PY

      - name: Pure-logic tests
        run: pytest tests/test_nrs2002.py tests/test_meal_plan_validator.py tests/test_nl2sql_safety.py tests/test_echarts.py -v

      # 图 / 记忆测试此前不在 CI 里 → 随代码演进静默腐烂(general_consult / 确定性筛查
      # 改了实现但测试没跟上)。全部用 monkeypatch 打成离线确定性,纳入 CI 守护。
      - name: Agent graph + short-term memory tests
        run: pytest tests/test_nutritionist_graph.py tests/test_short_term_memory.py -v
